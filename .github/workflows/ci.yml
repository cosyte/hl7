name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Universal gates from the shared pipeline (typecheck, lint, format, test, coverage, build, attw,
  # dual ESM/CJS smoke, actionlint) on the standard Node matrix. hl7 ships a PHI scanner, so the
  # shared pipeline's optional PHI-scan step is switched on.
  ci:
    uses: cosyte/.github/.github/workflows/ci.yml@main
    with:
      run-phi-scan: true

  # hl7-specific extras: the examples smoke (exercises real parse/build/serialize usage) + the
  # profile-starter-kit growth template (install/typecheck/lint/test/build) + actionlint on the kit's
  # workflows. pnpm 10 only WARNS on esbuild's build script, so the kit's --no-frozen-lockfile install
  # completes here (the kit is a copy-and-customize template; it commits no lockfile).
  extras:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build (examples + kit import the built package)
        run: pnpm build
      - name: Examples (smoke)
        run: pnpm examples
      - name: Starter kit (install + typecheck + lint + test + build)
        working-directory: examples/profile-starter-kit
        run: |
          pnpm install --no-frozen-lockfile
          pnpm typecheck
          pnpm lint
          pnpm test
          pnpm build
      - name: Validate kit workflows (actionlint)
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1
        with:
          fail_on_error: true
          actionlint_flags: -color=never examples/profile-starter-kit/.github/workflows/ci.yml examples/profile-starter-kit/.github/workflows/publish.yml
