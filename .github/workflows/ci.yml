name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on new pushes to the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: verify (node-${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["18", "20", "22"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test

      - name: Test (with coverage)
        run: pnpm test:coverage

      - name: Examples (smoke)
        if: matrix.node == '20'
        run: pnpm examples

      - name: Starter kit (install + test + build)
        if: matrix.node == '20'
        working-directory: examples/profile-starter-kit
        run: |
          pnpm install --no-frozen-lockfile
          pnpm typecheck
          pnpm lint
          pnpm test
          pnpm build

      - name: Validate kit workflows (actionlint)
        if: matrix.node == '20'
        uses: reviewdog/action-actionlint@v1
        with:
          actionlint_flags: -color=never examples/profile-starter-kit/.github/workflows/ci.yml examples/profile-starter-kit/.github/workflows/publish.yml

      - name: Build
        run: pnpm build

      - name: Verify dual-module build artifacts
        run: |
          test -f dist/index.mjs
          test -f dist/index.cjs
          test -f dist/index.d.ts
          node -e "import('./dist/index.mjs').then(m => { if (typeof m.VERSION !== 'string') { console.error('ESM missing VERSION'); process.exit(1); } console.log('ESM OK:', m.VERSION); })"
          node -e "const m = require('./dist/index.cjs'); if (typeof m.VERSION !== 'string') { console.error('CJS missing VERSION'); process.exit(1); } console.log('CJS OK:', m.VERSION);"
