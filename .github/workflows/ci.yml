name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Universal gates from the shared pipeline (typecheck, lint, format, test, coverage, build, attw,
  # dual ESM/CJS smoke, actionlint) on the standard Node matrix.
  ci:
    uses: cosyte/.github/.github/workflows/ci.yml@main

  # hl7-specific extras: the examples smoke + the profile-starter-kit growth template.
  extras:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Examples (smoke)
        run: pnpm examples
      - name: Starter kit (install + typecheck + lint + test + build)
        working-directory: examples/profile-starter-kit
        run: |
          pnpm install --no-frozen-lockfile
          pnpm typecheck
          pnpm lint
          pnpm test
          pnpm build
      - name: Validate kit workflows (actionlint)
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1
        with:
          fail_on_error: true
          actionlint_flags: -color=never examples/profile-starter-kit/.github/workflows/ci.yml examples/profile-starter-kit/.github/workflows/publish.yml
